name: TeResuelvo Orfeo v4

on:
  workflow_dispatch:

  schedule:
    - cron: '*/15 * * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Execute Orfeo
        run: node run.js

      - name: Timestamp
        run: date
