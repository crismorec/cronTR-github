name: TeResuelvo Orfeo v3

on:
  workflow_dispatch:

  schedule:
    - cron: '*/15 * * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx playwright install chromium

      - run: node run.js

      - run: date
