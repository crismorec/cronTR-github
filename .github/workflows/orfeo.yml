name: TeResuelvo Orfeo

on:
  schedule:
    - cron: "*/3 * * * *"

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install playwright

      - run: npx playwright install chromium

      - run: node run.js
